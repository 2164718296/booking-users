<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧预约平台 · 用户车辆信息</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 24px;
      color: #333;
    }
    h1 { color: #fff; text-align: center; margin-bottom: 8px; font-weight: 600; }
    .subtitle { color: rgba(255,255,255,.85); text-align: center; margin-bottom: 24px; font-size: 14px; }
    .toolbar {
      background: #fff; border-radius: 12px; padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1); margin-bottom: 20px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .toolbar input {
      flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    .toolbar input:focus { border-color: #667eea; }
    .toolbar button {
      padding: 10px 20px; background: #667eea; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font-size: 14px; transition: background .2s;
    }
    .toolbar button:hover { background: #5568d3; }
    .toolbar button.reset { background: #999; }
    .toolbar button.reset:hover { background: #777; }
    #status { font-size: 13px; color: #888; }
    .card {
      background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
    }
    .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .user-name { font-size: 20px; font-weight: 600; }
    .user-meta { color: #888; font-size: 13px; margin-top: 4px; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 500;
    }
    .badge.gold { background: #fff3cd; color: #856404; }
    .badge.silver { background: #e2e3e5; color: #6c757d; }
    .badge.normal { background: #d1ecf1; color: #0c5460; }
    .vehicle {
      background: #f8f9ff; border-left: 3px solid #667eea; padding: 12px 14px;
      border-radius: 6px; margin-top: 10px;
    }
    .vehicle-plate { font-weight: 600; color: #2c3e50; font-size: 15px; }
    .vehicle-info { color: #666; font-size: 13px; margin-top: 6px; line-height: 1.7; }
    .vehicle-info span { margin-right: 14px; }
    .empty { text-align: center; color: #fff; padding: 40px; font-size: 16px; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>🚗 智慧预约平台</h1>
  <p class="subtitle">用户 / 车辆信息查询系统 · 数据接口：<code>/api/users</code></p>

  <div class="toolbar">
    <input id="q" placeholder="输入用户ID（如 U001）/ 手机号 / 姓名 查询">
    <button onclick="search()">查询</button>
    <button class="reset" onclick="loadAll()">显示全部</button>
    <span id="status"></span>
  </div>

  <div id="list"></div>

  <script>
    const badgeClass = lv => ({'金卡会员':'gold','银卡会员':'silver','普通会员':'normal'}[lv] || 'normal');

    function render(data) {
      const list = document.getElementById('list');
      if (!data || data.length === 0) {
        list.innerHTML = '<div class="empty">未找到匹配的用户</div>';
        return;
      }
      list.innerHTML = data.map(u => `
        <div class="card">
          <div class="user-header">
            <div>
              <div class="user-name">${u.name}</div>
              <div class="user-meta">ID: ${u.userId} · 📞 ${u.phone}</div>
            </div>
            <span class="badge ${badgeClass(u.memberLevel)}">${u.memberLevel}</span>
          </div>
          ${u.vehicles.map(v => `
            <div class="vehicle">
              <div class="vehicle-plate">🚙 ${v.plate} · ${v.brand} ${v.model}</div>
              <div class="vehicle-info">
                <span>年份: ${v.year}</span>
                <span>里程: ${v.mileage} km</span>
                <span>上次保养: ${v.lastService}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    async function loadAll() {
      document.getElementById('q').value = '';
      document.getElementById('status').textContent = '加载中...';
      const r = await fetch('/api/users');
      const j = await r.json();
      render(j.data);
      document.getElementById('status').textContent = `共 ${j.count} 位用户`;
    }

    async function search() {
      const q = document.getElementById('q').value.trim();
      if (!q) return loadAll();
      document.getElementById('status').textContent = '查询中...';
      // 自动判断：U 开头按 userId，纯数字按 phone，否则按 name
      let url = '/api/users?';
      if (/^u\d+$/i.test(q)) url += 'userId=' + q;
      else if (/^\d+$/.test(q)) url += 'phone=' + q;
      else url += 'name=' + encodeURIComponent(q);
      const r = await fetch(url);
      const j = await r.json();
      render(j.data);
      document.getElementById('status').textContent = `找到 ${j.count} 位用户`;
    }

    document.getElementById('q').addEventListener('keydown', e => { if(e.key==='Enter') search(); });
    loadAll();
  </script>
</body>
</html>
